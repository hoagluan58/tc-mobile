<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ten Crush — Play Now</title>
  <meta name="description" content="Crush, match and reach 10! Play Ten Crush puzzle game directly in your browser." />
  <meta name="theme-color" content="#0b0e2a" />

  <!-- Open Graph -->
  <meta property="og:title" content="Ten Crush — Play Now" />
  <meta property="og:description" content="Crush, match and reach 10! Play directly in your browser!" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e2a;
      --surface:   #111638;
      --accent:    #4fc3f7;
      --accent2:   #ab47bc;
      --candy1:    #66bb6a;
      --candy2:    #ffa726;
      --candy3:    #ef5350;
      --text:      #eef2ff;
      --muted:     #8892b0;
      --radius:    16px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ── Loading screen ─────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loader-title {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .loader-title .ten {
      background: linear-gradient(135deg, var(--accent), #81d4fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .loader-title .crush {
      background: linear-gradient(135deg, var(--candy2), var(--candy3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .loader-tagline {
      color: var(--muted);
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      font-weight: 300;
      margin-bottom: 48px;
      letter-spacing: 0.06em;
    }

    /* floating number blocks */
    .block {
      position: absolute;
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.2rem;
      color: #fff;
      opacity: 0.12;
      pointer-events: none;
      z-index: -1;
    }
    .b1  { background: var(--candy1); top: 8%; left: 12%; animation: float 7s ease-in-out infinite; }
    .b2  { background: var(--accent); top: 18%; right: 10%; animation: float 9s ease-in-out infinite 1s; }
    .b3  { background: var(--candy2); bottom: 22%; left: 8%; animation: float 8s ease-in-out infinite 2s; }
    .b4  { background: var(--candy3); bottom: 12%; right: 15%; animation: float 6s ease-in-out infinite 0.5s; }
    .b5  { background: var(--accent2); top: 45%; left: 5%; animation: float 10s ease-in-out infinite 3s; }
    .b6  { background: var(--accent); top: 55%; right: 6%; animation: float 7.5s ease-in-out infinite 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-20px) rotate(8deg); }
    }

    /* progress */
    .progress-wrap {
      width: min(320px, 70vw);
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
      height: 6px;
      margin-bottom: 16px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 100px;
      transition: width 0.3s ease;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--candy2));
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      box-shadow: 0 0 14px rgba(79,195,247,0.5);
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: 0% 0; }
    }
    .progress-label {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }

    /* animated dots */
    .dots::after {
      content: '';
      animation: dots 1.4s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* glowing orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: -1;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .orb1 { width: 450px; height: 450px; background: rgba(79,195,247,0.1); top: -120px; left: -120px; }
    .orb2 { width: 350px; height: 350px; background: rgba(171,71,188,0.1); bottom: -100px; right: -100px; animation-delay: -5s; }
    .orb3 { width: 250px; height: 250px; background: rgba(255,167,38,0.08); top: 40%; right: -60px; animation-delay: -3s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(25px, 18px) scale(1.05); } }

    /* ── Game container ─────────────────────────────── */
    #game-wrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #000;
    }

    #unity-canvas {
      width:  min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      display: block;
      touch-action: none;
    }

    /* Error overlay */
    #error-overlay {
      display: none;
      position: fixed; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: rgba(11,14,42,0.95);
      z-index: 200;
    }
    #error-overlay.visible { display: flex; }
    #error-overlay h2 { color: #ef5350; font-size: 1.4rem; }
    #error-overlay p  { color: var(--muted); text-align: center; max-width: 320px; font-size: 0.9rem; line-height: 1.6; }
    .retry-btn {
      margin-top: 8px;
      padding: 12px 28px;
      border: none; border-radius: 100px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-family: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,195,247,0.4); }
    .retry-btn:active { transform: translateY(0); }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="block b1">3</div>
  <div class="block b2">8</div>
  <div class="block b3">6</div>
  <div class="block b4">4</div>
  <div class="block b5">7</div>
  <div class="block b6">2</div>

  <div class="loader-title"><span class="ten">Ten</span> <span class="crush">Crush</span></div>
  <div class="loader-tagline">Match numbers · Reach 10 · Crush them all</div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-label">Loading<span class="dots"></span></div>
</div>

<!-- Error overlay -->
<div id="error-overlay">
  <h2>⚠️ Failed to Load</h2>
  <p>Something went wrong loading the game. Please check your connection and try again.</p>
  <button class="retry-btn" onclick="location.reload()">Retry</button>
</div>

<!-- Unity canvas -->
<div id="game-wrap">
  <canvas id="unity-canvas" tabindex="-1"></canvas>
</div>

<script>
  var buildUrl  = "Build";
  var loaderUrl = buildUrl + "/LocalWebGLBuild.loader.js";
  var config = {
    dataUrl:            buildUrl + "/LocalWebGLBuild.data.unityweb",
    frameworkUrl:       buildUrl + "/LocalWebGLBuild.framework.js.unityweb",
    codeUrl:            buildUrl + "/LocalWebGLBuild.wasm.unityweb",
    streamingAssetsUrl: "StreamingAssets",
    companyName:        "TSA",
    productName:        "TenCrush",
    productVersion:     "0.1",
  };

  var canvas        = document.getElementById("unity-canvas");
  var loadingScreen = document.getElementById("loading-screen");
  var progressBar   = document.getElementById("progress-bar");
  var errorOverlay  = document.getElementById("error-overlay");

  var script = document.createElement("script");
  script.src  = loaderUrl;
  script.onerror = function() {
    loadingScreen.classList.add("hidden");
    errorOverlay.classList.add("visible");
  };
  script.onload = function() {
    createUnityInstance(canvas, config, function(progress) {
      progressBar.style.width = (100 * progress) + "%";
    }).then(function(unityInstance) {
      setTimeout(function() {
        loadingScreen.classList.add("hidden");
      }, 400);
    }).catch(function(message) {
      console.error("Unity load error:", message);
      loadingScreen.classList.add("hidden");
      errorOverlay.classList.add("visible");
    });
  };
  document.body.appendChild(script);
</script>
</body>
</html>
